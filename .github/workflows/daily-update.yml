name: Daily product selection update

on:
  schedule:
    # 02:00 UTC = 10:00 Asia/Shanghai
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Refresh all 40 SKUs (uses about 40 API calls)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build preliminary daily shortlist
        run: python scripts/generate_daily_data.py

      - name: Refresh official marketplace data
        env:
          TAOBAO_ALLIANCE_APP_KEY: ${{ secrets.TAOBAO_ALLIANCE_APP_KEY }}
          TAOBAO_ALLIANCE_APP_SECRET: ${{ secrets.TAOBAO_ALLIANCE_APP_SECRET }}
          TAOBAO_ADZONE_ID: ${{ secrets.TAOBAO_ADZONE_ID }}
          JD_UNION_APP_KEY: ${{ secrets.JD_UNION_APP_KEY }}
          JD_UNION_APP_SECRET: ${{ secrets.JD_UNION_APP_SECRET }}
          JD_UNION_ID: ${{ secrets.JD_UNION_ID }}
          DOUYIN_CLIENT_KEY: ${{ secrets.DOUYIN_CLIENT_KEY }}
          DOUYIN_CLIENT_SECRET: ${{ secrets.DOUYIN_CLIENT_SECRET }}
          DOUYIN_REFRESH_TOKEN: ${{ secrets.DOUYIN_REFRESH_TOKEN }}
          DOUYIN_REFRESH_TOKEN_OUTPUT: ${{ runner.temp }}/douyin_refresh_token
        run: python scripts/sync_market_data.py

      - name: Rotate Douyin refresh token
        env:
          GH_TOKEN: ${{ secrets.MARKET_SECRETS_PAT }}
          TOKEN_FILE: ${{ runner.temp }}/douyin_refresh_token
        run: |
          if [ -s "$TOKEN_FILE" ] && [ -n "$GH_TOKEN" ]; then
            gh secret set DOUYIN_REFRESH_TOKEN --repo "${{ github.repository }}" < "$TOKEN_FILE"
            echo "Douyin refresh token rotated."
          elif [ -s "$TOKEN_FILE" ]; then
            echo "::warning::MARKET_SECRETS_PAT is not configured; update DOUYIN_REFRESH_TOKEN before the next refresh."
          fi
          rm -f "$TOKEN_FILE"

      - name: Refresh audited 1688 SKU prices
        env:
          TOP_APP_KEY: ${{ secrets.TOP_APP_KEY }}
          TOP_APP_SECRET: ${{ secrets.TOP_APP_SECRET }}
          ELIM_API_KEY: ${{ secrets.ELIM_API_KEY }}
          ELIM_ACCESS_TOKEN: ${{ secrets.ELIM_ACCESS_TOKEN }}
          ELIM_DAILY_LIMIT: "5"
          SUPPLY_1688_FEED_URL: ${{ secrets.SUPPLY_1688_FEED_URL }}
          SUPPLY_1688_FEED_TOKEN: ${{ secrets.SUPPLY_1688_FEED_TOKEN }}
        run: |
          ARGS="--allow-missing"
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            ARGS="$ARGS --full-refresh"
          fi
          python scripts/sync_1688_prices.py $ARGS

      - name: Generate daily recommendation data
        run: python scripts/generate_daily_data.py

      - name: Validate dashboard data
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_dashboard.py

      - name: Commit refreshed daily data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/1688_supply_prices.json data/market_data.json data/recommendations.json data/selection_history.json docs/daily
          git diff --cached --quiet || git commit -m "chore: update daily selection data"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
